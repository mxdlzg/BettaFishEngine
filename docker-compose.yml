services:
  bettafish-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: bettafish-gateway:latest
    container_name: bettafish-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ENGINE_GATEWAY_HOST=0.0.0.0
      - ENGINE_GATEWAY_DEBUG=0
      - DB_DIALECT=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bettafish-db
      - DB_USER=bettafish
      - DB_PASSWORD=bettafish
    ports:
      - "8014:8000"
    volumes:
      - ./logs:/app/logs
      - ./final_reports:/app/final_reports
      - ./.env:/app/.env  
      - ./insight_engine_streamlit_reports:/app/insight_engine_streamlit_reports
      - ./media_engine_streamlit_reports:/app/media_engine_streamlit_reports
      - ./query_engine_streamlit_reports:/app/query_engine_streamlit_reports
    networks:
      - deepagents-net

networks:
  deepagents-net:
    external: true
    name: deepagents-net
